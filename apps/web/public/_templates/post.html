<!doctype html>
<html lang="zh-CN" data-theme="light" data-ui-style="{{UI_WEB_STYLE}}" data-cmd-layout="{{CMD_LAYOUT}}" data-cmd-confirm="{{CMD_CONFIRM}}" data-cmd-mobile-sync="{{CMD_MOBILE_SYNC}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("ui-theme");
          if (stored) document.documentElement.setAttribute("data-theme", stored);
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/ui/base.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/style-pack.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/post-page.css?__cv={{CACHE_VERSION}}" />
  </head>
  <body data-page="post">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a class="brand" href="/">Bitlog</a>
        </div>

        <div class="header-center">
          <form class="search" action="/articles" method="get">
            <input
              id="navSearch"
              name="q"
              value=""
              aria-label="搜索文章"
              placeholder="搜索文章（Ctrl/Cmd+F 聚焦）"
            />
          </form>
        </div>

        <div class="header-right">
          <nav id="siteMainNav" class="nav nav-main" aria-label="主导航">
            <a href="/">首页</a>
            <a class="active" href="/articles">文章</a>
            <a href="/projects">项目</a>
            <a href="/tools">工具中心</a>
            <a href="/about">关于我</a>
          </nav>
          <button class="btn ghost icon" id="navSearchToggle" type="button" aria-label="搜索" title="搜索">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
              <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <button
            class="btn ghost icon"
            id="navMenuToggle"
            type="button"
            aria-label="Toggle navigation"
            title="Toggle navigation"
            aria-controls="siteMainNav"
            aria-expanded="false"
          >
            <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path class="menu-icon-line line-top" d="M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path class="menu-icon-line line-mid" d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path class="menu-icon-line line-bottom" d="M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <button class="btn ghost icon" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <path
                d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.07-7.07-1.41 1.41M8.34 15.66l-1.41 1.41m0-11.31 1.41 1.41m8.32 8.32 1.41 1.41"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container page-wrap">
      <div class="layout">
        <section>
          <article class="card">
            <div class="card-body">
              <div class="post-header">
                <div class="post-meta">
                  <a class="chip post-back" id="postBack" href="/articles" aria-label="返回文章列表">← 返回</a>
                  <span class="post-date">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                      <line x1="16" y1="2" x2="16" y2="6"></line>
                      <line x1="8" y1="2" x2="8" y2="6"></line>
                      <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    {{POST_DATE}}
                  </span>
                  {{CATEGORY_CHIP}}
                </div>
                <h1 class="post-title">{{POST_TITLE}}</h1>
                <p class="post-summary">{{POST_SUMMARY}}</p>
              </div>
              <div class="prose">{{POST_CONTENT}}</div>
            </div>
          </article>
        </section>

        <aside>
          <details class="card aside-block post-toc">
            <summary class="toc-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
              目录
            </summary>
            <div class="toc toc-list">{{TOC_GROUPS}}</div>
          </details>

          <div style="height: 20px"></div>

          <div class="card aside-block">
            <h3 class="sidebar-card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                <line x1="7" y1="7" x2="7.01" y2="7"></line>
              </svg>
              标签
            </h3>
            <div class="tag-list">{{TAG_CHIPS}}</div>
          </div>
        </aside>
      </div>
    </main>

    {{SITE_FOOTER}}
    <button class="scroll-to-top" id="scrollToTop" type="button" aria-label="返回顶部" title="返回顶部">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 19V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <script src="/ui/theme-toggle.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/search-suggest.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/nav-menu.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/code-copy.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/toc-active.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/back-to-top.js?__cv={{CACHE_VERSION}}"></script>
    <script>
      window.__bitlogShortcutsText = {{SHORTCUTS_TEXT}};
      window.__bitlogWebNav = {{WEB_NAV_JSON}};
    </script>
    <script src="/ui/shortcuts.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/spa-nav.js?__cv={{CACHE_VERSION}}"></script>
    <script>
      (function () {
        const now = () => Date.now();
        const TTL = 12 * 60 * 60 * 1000;

        function formatNumber(n) {
          const x = Number(n);
          if (!Number.isFinite(x)) return "—";
          if (x >= 1e6) return (x / 1e6).toFixed(1).replace(/\\.0$/, "") + "m";
          if (x >= 1e3) return (x / 1e3).toFixed(1).replace(/\\.0$/, "") + "k";
          return String(Math.floor(x));
        }

        function setText(el, s) {
          if (el) el.textContent = String(s ?? "");
        }

        async function fetchWithCache(storeKey, fetcher) {
          const cache = (() => {
            try {
              return localStorage.getItem(storeKey);
            } catch {
              return null;
            }
          })();
          if (cache) {
            try {
              const parsed = JSON.parse(cache);
              if (parsed && typeof parsed.ts === "number" && now() - parsed.ts < TTL && parsed.data) return parsed.data;
            } catch {}
          }
          const data = await fetcher();
          try {
            localStorage.setItem(storeKey, JSON.stringify({ ts: now(), data }));
          } catch {}
          return data;
        }

        function hydrateCards(cards, fetchRepoData) {
          cards.forEach((a) => {
            const repo = a.getAttribute("data-repo");
            if (!repo) return;
            fetchRepoData(repo)
              .then((data) => {
                a.removeAttribute("data-loading");
                if (data && data.html_url) a.setAttribute("href", String(data.html_url));

                const avatar = a.querySelector(".embed-card__avatar");
                if (avatar && data?.owner?.avatar_url) {
                  avatar.setAttribute("src", String(data.owner.avatar_url));
                  avatar.setAttribute("alt", String(data.owner.login ?? ""));
                }

                setText(a.querySelector(".embed-card__title"), data?.full_name ?? repo);
                setText(a.querySelector(".embed-card__desc"), data?.description ?? "");
                setText(a.querySelector("[data-field='stars']"), formatNumber(data?.stargazers_count));
                setText(a.querySelector("[data-field='forks']"), formatNumber(data?.forks_count));
                setText(a.querySelector("[data-field='lang']"), data?.language ?? "—");
              })
              .catch(() => {
                a.removeAttribute("data-loading");
                const desc = a.querySelector(".embed-card__desc");
                if (desc && desc.textContent === "Loading…") desc.textContent = "";
              });
          });
        }

        const ghCards = document.querySelectorAll("a.embed-card--github[data-repo]");
        if (ghCards && ghCards.length > 0) {
          hydrateCards(ghCards, (repo) =>
            fetchWithCache(`bitlog_gh_repo_${repo}`, async () => {
              const url = `https://api.github.com/repos/${repo}`;
              const res = await fetch(url, { headers: { accept: "application/vnd.github+json" } });
              if (!res.ok) throw new Error("github_api_failed");
              return await res.json();
            })
          );
        }

        const giteeCards = document.querySelectorAll("a.embed-card--gitee[data-repo]");
        if (giteeCards && giteeCards.length > 0) {
          hydrateCards(giteeCards, (repo) =>
            fetchWithCache(`bitlog_gitee_repo_${repo}`, async () => {
              const res = await fetch(`/api/embed/gitee?repo=${encodeURIComponent(repo)}`);
              if (!res.ok) throw new Error("gitee_api_failed");
              const json = await res.json();
              if (!json || json.ok !== true || !json.repo) throw new Error("gitee_invalid_payload");
              return json.repo;
            })
          );
        }
      })();
    </script>
  </body>
</html>
