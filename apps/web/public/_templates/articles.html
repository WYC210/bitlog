<!doctype html>
<html lang="zh-CN" data-theme="light" data-ui-style="{{UI_WEB_STYLE}}" data-cmd-layout="{{CMD_LAYOUT}}" data-cmd-confirm="{{CMD_CONFIRM}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("ui-theme");
          if (stored) document.documentElement.setAttribute("data-theme", stored);
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/ui/base.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/style-pack.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/articles-page.css?__cv={{CACHE_VERSION}}" />
  </head>
  <body data-page="articles">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a class="brand" href="/">Bitlog</a>
        </div>

        <div class="header-center">
          <form class="search" action="/articles" method="get">
            <input
              id="navSearch"
              name="q"
              value="{{SEARCH_VALUE}}"
              aria-label="搜索文章"
              placeholder="搜索文章（Ctrl/Cmd+F 聚焦）"
            />
          </form>
        </div>

        <div class="header-right">
          <nav class="nav nav-main" aria-label="主导航">
            <a href="/">首页</a>
            <a class="active" href="/articles">文章</a>
            <a href="/projects">项目</a>
            <a href="/tools">工具中心</a>
            <a href="/about">关于我</a>
          </nav>
          <button class="btn ghost icon" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <path
                d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.07-7.07-1.41 1.41M8.34 15.66l-1.41 1.41m0-11.31 1.41 1.41m8.32 8.32 1.41 1.41"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container page-wrap">
      <div class="articles-header">
        <div class="articles-filter-bar">
          {{FILTER_PILL}}
          <span class="articles-result-meta">{{RESULT_META}}</span>
        </div>
      </div>

      <div class="layout">
        <section>
          <div class="article-list">{{POST_CARDS}}</div>
          {{PAGINATION}}
          <div class="footer">Tips：可使用分类/标签过滤，或搜索缩小范围。</div>
        </section>

        <aside class="articles-sidebar">
          <div class="sidebar-card">
            <h3 class="sidebar-card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
              分类
            </h3>
            <div class="tag-list">{{CATEGORIES}}</div>
          </div>

          <div class="sidebar-card">
            <h3 class="sidebar-card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                <line x1="7" y1="7" x2="7.01" y2="7"></line>
              </svg>
              标签
            </h3>
            <div class="tag-list">{{TAGS}}</div>
          </div>
        </aside>
      </div>
    </main>

    {{SITE_FOOTER}}
    <script src="/ui/theme-toggle.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/search-suggest.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/code-copy.js?__cv={{CACHE_VERSION}}"></script>
    <script>
      window.__bitlogShortcutsText = {{SHORTCUTS_TEXT}};
    </script>
    <script src="/ui/shortcuts.js?__cv={{CACHE_VERSION}}"></script>
  </body>
</html>
