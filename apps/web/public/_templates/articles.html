<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <style>
      :root {
        --bg: #0b1020;
        --surface: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --border: rgba(255, 255, 255, 0.12);
        --accent: #4b6bff;
        --radius: 14px;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(1200px 700px at 20% -10%, rgba(75, 107, 255, .25), transparent 55%), var(--bg);
        color: var(--text);
        font: 16px/1.75 system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        scroll-behavior: smooth;
      }
      a { color: inherit; text-decoration-color: rgba(75, 107, 255, .55); text-underline-offset: 3px; }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        background: rgba(11, 16, 32, .6);
      }
      .nav {
        max-width: 1180px;
        margin: 0 auto;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }
      .brand { font-weight: 750; letter-spacing: .2px; flex: 0 0 auto; }
      .nav-search { flex: 1 1 520px; display: flex; justify-content: flex-end; min-width: 220px; order: 2; }
      .search { width: min(640px, 100%); position: relative; }
      .search input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        outline: none;
      }
      .search input:focus { border-color: rgba(75, 107, 255, 0.45); }
      .pill {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 64vw;
        flex: 0 0 auto;
        order: 3;
      }
      .pill strong { color: var(--text); font-weight: 650; }
      .pill .sep { opacity: 0.6; }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 26px 18px 70px; }
      .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(260px, 320px); gap: 18px; align-items: start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      .card {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }
      .meta { color: var(--muted); font-size: 13px; }
      .article-card { padding: 16px 16px 18px; }
      .article-title { margin: 8px 0 6px; font-size: 20px; line-height: 1.2; letter-spacing: -0.2px; }
      .article-summary { margin: 0; color: rgba(255, 255, 255, 0.78); font-size: 14px; }
      .article-meta { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }
      .chip:hover { color: var(--text); border-color: rgba(75, 107, 255, 0.35); background: rgba(75, 107, 255, 0.12); }
      .chip--cat { color: rgba(255, 255, 255, 0.86); border-color: rgba(75, 107, 255, 0.28); background: rgba(75, 107, 255, 0.14); }
      aside { position: sticky; top: 86px; }
      details { border: 1px solid rgba(255,255,255,0.10); border-radius: 12px; overflow: clip; background: rgba(255,255,255,0.03); }
      details + details { margin-top: 10px; }
      summary { cursor: pointer; list-style: none; padding: 12px 12px; color: rgba(255,255,255,0.86); font-weight: 650; }
      summary::-webkit-details-marker { display: none; }
      .panel { padding: 0 12px 12px; }
      footer { color: var(--muted); font-size: 13px; padding: 34px 0 0; }
    </style>
  </head>
  <body data-page="articles">
    <header>
      <div class="nav">
        <a class="brand" href="/articles">{{SITE_TITLE}}</a>
        <div class="nav-search">
          <form class="search" action="/articles" method="get">
            <input id="navSearch" name="q" value="{{SEARCH_VALUE}}" placeholder="搜索文章（Ctrl/Cmd+F 聚焦）" />
          </form>
        </div>
        {{FILTER_PILL}}
      </div>
    </header>
    <div class="wrap">
      <div class="grid">
        <main>
          <div style="display:grid; gap:12px;">
            {{POST_CARDS}}
          </div>
          <footer>Tips: 你也可以用标签/分类过滤，再用搜索缩小范围。</footer>
        </main>
        <aside>
          <details open>
            <summary>分类</summary>
            <div class="panel">
              <div class="chips">{{CATEGORIES}}</div>
            </div>
          </details>
          <details open>
            <summary>标签</summary>
            <div class="panel">
              <div class="chips">{{TAGS}}</div>
            </div>
          </details>
        </aside>
      </div>
    </div>
    <script>
      (function(){
        const shortcutsText = {{SHORTCUTS_TEXT}};
        const page = document.body?.dataset?.page || "global";
        const search = document.getElementById('navSearch');

        function shouldIgnore(e){
          const t = e.target;
          if (!t) return false;
          const tag = (t.tagName || '').toLowerCase();
          return tag === 'input' || tag === 'textarea' || tag === 'select' || t.isContentEditable;
        }

        function parseShortcuts(){
          try { return shortcutsText ? JSON.parse(shortcutsText) : {}; } catch { return {}; }
        }

        const sc = parseShortcuts();
        const effective = Object.assign({}, sc?.global || {}, sc?.contexts?.[page] || {});
        const getSpec = (k, fallback) => (effective && effective[k]) ? String(effective[k]) : fallback;

        const specs = {
          focusSearch: getSpec("focusSearch", "ctrl+f"),
          goHome: getSpec("goHome", "ctrl+h"),
          back: getSpec("goBack", getSpec("back", "g b")),
          forward: getSpec("goForward", getSpec("forward", "g n"))
        };

        function matchChord(e, combo){
          const s = String(combo || "").trim().toLowerCase();
          if (!s || s.includes(" ")) return false;
          const parts = s.split('+').map(x=>x.trim()).filter(Boolean);
          const key = (e.key || '').toLowerCase();
          const wantCtrl = parts.includes('ctrl');
          const wantMeta = parts.includes('meta');
          const wantMod = parts.includes('cmd') || parts.includes('mod');
          const wantAlt = parts.includes('alt');
          const wantShift = parts.includes('shift');
          const wantKey = parts.find(p=>!['ctrl','cmd','mod','meta','alt','shift'].includes(p));
          if (wantCtrl && !e.ctrlKey) return false;
          if (wantMeta && !e.metaKey) return false;
          if (wantMod && !(e.ctrlKey || e.metaKey)) return false;
          if (wantAlt && !e.altKey) return false;
          if (wantShift && !e.shiftKey) return false;
          if (wantKey && wantKey !== key) return false;
          return true;
        }

        function parseSeq(spec){
          const s = String(spec || "").trim().toLowerCase();
          if (!s.includes(" ")) return null;
          return s.split(/\s+/).map(x=>x.trim()).filter(Boolean);
        }

        let seq = [];
        let seqTimer = null;
        function pushSeq(key){
          if (!key || key.length !== 1) return;
          seq.push(key);
          if (seq.length > 4) seq.shift();
          if (seqTimer) clearTimeout(seqTimer);
          seqTimer = setTimeout(()=>{ seq = []; seqTimer = null; }, 900);
        }
        function matchSeq(keys){
          if (!keys || !keys.length) return false;
          if (seq.length < keys.length) return false;
          const tail = seq.slice(seq.length - keys.length);
          for (let i=0;i<keys.length;i++){
            if (tail[i] !== keys[i]) return false;
          }
          return true;
        }

        function focusSearch(){
          if (!search) return;
          search.focus();
          try { search.select(); } catch {}
        }

        const url = new URL(window.location.href);
        if (url.searchParams.get("focus") === "1") {
          focusSearch();
          url.searchParams.delete("focus");
          history.replaceState(null, "", url.toString());
        }

        document.addEventListener('keydown', (e)=>{
          if (shouldIgnore(e)) return;

          if (!e.ctrlKey && !e.metaKey && !e.altKey) pushSeq((e.key || "").toLowerCase());

          if (matchChord(e, specs.focusSearch)) { e.preventDefault(); focusSearch(); return; }
          if (matchChord(e, specs.goHome)) { e.preventDefault(); window.location.href = "/articles"; return; }

          const backSeq = parseSeq(specs.back);
          const fwdSeq = parseSeq(specs.forward);
          if (matchChord(e, specs.back) || (backSeq && matchSeq(backSeq))) { e.preventDefault(); history.back(); return; }
          if (matchChord(e, specs.forward) || (fwdSeq && matchSeq(fwdSeq))) { e.preventDefault(); history.forward(); return; }
        });
      })();
    </script>
  </body>
</html>
