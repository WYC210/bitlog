<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("ui-theme");
          if (stored) document.documentElement.setAttribute("data-theme", stored);
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/ui/base.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/home-page.css?__cv={{CACHE_VERSION}}" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a class="brand" href="/">Bitlog</a>
        </div>

        <div class="header-center">
          <form class="search" action="/articles" method="get">
            <input
              id="navSearch"
              name="q"
              value=""
              aria-label="搜索文章"
              placeholder="搜索文章（Ctrl/Cmd+F 聚焦）"
            />
          </form>
        </div>

        <div class="header-right">
          <nav class="nav nav-main" aria-label="主导航">
            <a class="active" href="/">首页</a>
            <a href="/articles">文章</a>
            <a href="/projects">项目</a>
            <a href="/tools">工具中心</a>
            <a href="/about">关于我</a>
          </nav>
          <a class="btn ghost" href="/admin/">我的</a>
          <button class="btn ghost icon" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <path
                d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.07-7.07-1.41 1.41M8.34 15.66l-1.41 1.41m0-11.31 1.41 1.41m8.32 8.32 1.41 1.41"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container page-wrap">
      <section class="hero">
        <h1 class="hero-title">{{SITE_TITLE}}</h1>
        <p class="hero-subtitle">{{SITE_DESC}}</p>
        <div class="hero-actions">
          <a class="btn primary" href="/articles">开始阅读</a>
          <a class="btn" href="/rss.xml">订阅 RSS</a>
        </div>
      </section>
    </main>

    {{SITE_FOOTER}}

    <script src="/ui/theme-toggle.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/search-suggest.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/code-copy.js?__cv={{CACHE_VERSION}}"></script>
    <script>
      (function () {
        const shortcutsText = {{SHORTCUTS_TEXT}};
        const page = document.body?.dataset?.page || "global";
        const search = document.getElementById("navSearch");

        function shouldIgnore(e) {
          const t = e.target;
          if (!t) return false;
          const tag = (t.tagName || "").toLowerCase();
          return tag === "input" || tag === "textarea" || tag === "select" || t.isContentEditable;
        }

        function parseShortcuts() {
          try {
            return shortcutsText ? JSON.parse(shortcutsText) : {};
          } catch {
            return {};
          }
        }

        const sc = parseShortcuts();
        const effective = Object.assign({}, sc?.global || {}, sc?.contexts?.[page] || {});
        const getSpec = (k, fallback) => (effective && effective[k] ? String(effective[k]) : fallback);

        const specs = {
          focusSearch: getSpec("focusSearch", "ctrl+f"),
          goHome: getSpec("goHome", "ctrl+h"),
          back: getSpec("goBack", getSpec("back", "g b")),
          forward: getSpec("goForward", getSpec("forward", "g n"))
        };

        function matchChord(e, combo) {
          const s = String(combo || "").trim().toLowerCase();
          if (!s || s.includes(" ")) return false;
          const parts = s
            .split("+")
            .map((x) => x.trim())
            .filter(Boolean);
          const key = (e.key || "").toLowerCase();
          const wantCtrl = parts.includes("ctrl");
          const wantMeta = parts.includes("meta");
          const wantMod = parts.includes("cmd") || parts.includes("mod");
          const wantAlt = parts.includes("alt");
          const wantShift = parts.includes("shift");
          const wantKey = parts.find((p) => !["ctrl", "cmd", "mod", "meta", "alt", "shift"].includes(p));
          if (wantCtrl && !e.ctrlKey) return false;
          if (wantMeta && !e.metaKey) return false;
          if (wantMod && !(e.ctrlKey || e.metaKey)) return false;
          if (wantAlt && !e.altKey) return false;
          if (wantShift && !e.shiftKey) return false;
          if (wantKey && wantKey !== key) return false;
          return true;
        }

        function parseSeq(spec) {
          const s = String(spec || "").trim().toLowerCase();
          if (!s.includes(" ")) return null;
          return s.split(/\s+/).map((x) => x.trim()).filter(Boolean);
        }

        let seq = [];
        let seqTimer = null;
        function pushSeq(key) {
          if (!key || key.length !== 1) return;
          seq.push(key);
          if (seq.length > 4) seq.shift();
          if (seqTimer) clearTimeout(seqTimer);
          seqTimer = setTimeout(() => {
            seq = [];
            seqTimer = null;
          }, 900);
        }
        function matchSeq(keys) {
          if (!keys || !keys.length) return false;
          if (seq.length < keys.length) return false;
          const tail = seq.slice(seq.length - keys.length);
          for (let i = 0; i < keys.length; i++) {
            if (tail[i] !== keys[i]) return false;
          }
          return true;
        }

        function focusSearch() {
          if (!search) return;
          search.focus();
          try {
            search.select();
          } catch {}
        }

        document.addEventListener("keydown", (e) => {
          if (shouldIgnore(e)) return;

          if (!e.ctrlKey && !e.metaKey && !e.altKey) pushSeq((e.key || "").toLowerCase());

          if (matchChord(e, specs.focusSearch)) {
            e.preventDefault();
            focusSearch();
            return;
          }
          if (matchChord(e, specs.goHome)) {
            e.preventDefault();
            window.location.href = "/";
            return;
          }

          const backSeq = parseSeq(specs.back);
          const fwdSeq = parseSeq(specs.forward);
          if (matchChord(e, specs.back) || (backSeq && matchSeq(backSeq))) {
            e.preventDefault();
            history.back();
            return;
          }
          if (matchChord(e, specs.forward) || (fwdSeq && matchSeq(fwdSeq))) {
            e.preventDefault();
            history.forward();
            return;
          }
        });
      })();
    </script>
  </body>
</html>
