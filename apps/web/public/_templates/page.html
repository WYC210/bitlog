<!doctype html>
<html lang="zh-CN" data-theme="light" data-ui-style="{{UI_WEB_STYLE}}" data-cmd-layout="{{CMD_LAYOUT}}" data-cmd-confirm="{{CMD_CONFIRM}}" data-cmd-mobile-sync="{{CMD_MOBILE_SYNC}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("ui-theme");
          if (stored) document.documentElement.setAttribute("data-theme", stored);
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/ui/base.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/style-pack.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/about-page.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/hot/hot-page.css?__cv={{CACHE_VERSION}}" />
    <link rel="stylesheet" href="/ui/dashboard-widgets.css?__cv={{CACHE_VERSION}}" />
  </head>
  <body data-page="{{PAGE_ID}}">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a class="brand" href="/">Bitlog</a>
        </div>

        <div class="header-center">
          <form class="search" action="/articles" method="get">
            <input
              id="navSearch"
              name="q"
              value="{{SEARCH_VALUE}}"
              aria-label="搜索文章"
              placeholder="搜索文章（Ctrl/Cmd+F 聚焦）"
            />
          </form>
        </div>

        <div class="header-right">
          <nav id="siteMainNav" class="nav nav-main" aria-label="主导航">
            <a class="{{NAV_HOME_ACTIVE}}" href="/">首页</a>
            <a class="{{NAV_ARTICLES_ACTIVE}}" href="/articles">文章</a>
            <a class="{{NAV_PROJECTS_ACTIVE}}" href="/projects">项目</a>
            <a class="{{NAV_TOOLS_ACTIVE}}" href="/tools">工具中心</a>
            <a class="{{NAV_ABOUT_ACTIVE}}" href="/about">关于我</a>
          </nav>
          <button class="btn ghost icon" id="navSearchToggle" type="button" aria-label="搜索" title="搜索">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
              <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <button
            class="btn ghost icon"
            id="navMenuToggle"
            type="button"
            aria-label="Toggle navigation"
            title="Toggle navigation"
            aria-controls="siteMainNav"
            aria-expanded="false"
          >
            <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path class="menu-icon-line line-top" d="M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path class="menu-icon-line line-mid" d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path class="menu-icon-line line-bottom" d="M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <button class="btn ghost icon" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <path
                d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.07-7.07-1.41 1.41M8.34 15.66l-1.41 1.41m0-11.31 1.41 1.41m8.32 8.32 1.41 1.41"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container page-wrap">
      <!-- Check if this is the about page -->
      <div class="about-container">
        {{HERO_SECTION}}

        {{STATS_SECTION}}

        <!-- Main Layout with Sidebar -->
        <div class="about-layout">
          <!-- Main Content -->
          <div class="about-main">
            <article class="card">
              <div class="card-body">
                <div class="prose">{{MAIN_CONTENT}}</div>
              </div>
            </article>

            <!-- Skills Section -->
            <section class="about-section">
              <h2 class="about-section-title">技能专长</h2>
              <div class="about-skills-grid" id="about-skills">
                <div class="meta">加载中...</div>
              </div>
            </section>

            <!-- Timeline Section -->
            <section class="about-section">
              <h2 class="about-section-title">工作经历</h2>
              <div class="about-timeline" id="about-experience">
                <div class="meta">加载中...</div>
              </div>
            </section>

            <!-- Travel Footprint (moved under Work Experience) -->
            <section class="about-section">
              <h2 class="about-section-title">旅行足迹</h2>
              <div class="card" style="padding: 14px">
                <div class="nav" style="justify-content: space-between; align-items: center">
                  <div>
                    <div style="font-weight: 800; font-size: 18px">旅行足迹</div>
                    <div class="meta">3D 世界地图（浏览器运行）</div>
                  </div>
                  <button class="chip" id="aboutHeatmapReload" type="button">重载</button>
                </div>
                <div style="height: 10px"></div>
                <div
                  id="about-heatmap"
                  style="
                    height: 520px;
                    border-radius: 14px;
                    overflow: hidden;
                    border: 1px solid rgba(255, 255, 255, 0.08);
                  "
                ></div>
              </div>
            </section>

          </div>

          <!-- Sidebar Widgets -->
          <aside class="about-sidebar">

            <!-- Travel Footprint Widget -->
            <div class="glass-card" id="about-travel-card">
              <div class="glass-card-header">
                <h3 class="glass-card-title">
                  <div class="glass-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                      <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                  </div>
                  旅行足迹
                </h3>
                <span class="glass-card-badge">5</span>
              </div>
              <div class="glass-card-body">
                <div class="glass-list">
                  <div class="glass-list-item">
                    <div class="glass-list-item-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                      </svg>
                    </div>
                    <div class="glass-list-item-content">
                      <div class="glass-list-item-title">东京 · 日本</div>
                      <div class="glass-list-item-subtitle">
                        <span>2024年3月</span>
                      </div>
                    </div>
                  </div>

                  <div class="glass-list-item">
                    <div class="glass-list-item-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                      </svg>
                    </div>
                    <div class="glass-list-item-content">
                      <div class="glass-list-item-title">巴黎 · 法国</div>
                      <div class="glass-list-item-subtitle">
                        <span>2023年12月</span>
                      </div>
                    </div>
                  </div>

                  <div class="glass-list-item">
                    <div class="glass-list-item-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                      </svg>
                    </div>
                    <div class="glass-list-item-content">
                      <div class="glass-list-item-title">纽约 · 美国</div>
                      <div class="glass-list-item-subtitle">
                        <span>2023年8月</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    {{SITE_FOOTER}}
    {{TOOL_SCRIPT}}
    <script src="/ui/theme-toggle.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/search-suggest.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/nav-menu.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/code-copy.js?__cv={{CACHE_VERSION}}"></script>
    <script>
      window.__bitlogShortcutsText = {{SHORTCUTS_TEXT}};
      window.__bitlogWebNav = {{WEB_NAV_JSON}};
    </script>
    <script src="/ui/shortcuts.js?__cv={{CACHE_VERSION}}"></script>
    <script src="/ui/spa-nav.js?__cv={{CACHE_VERSION}}"></script>
  </body>
</html>
