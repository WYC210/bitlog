name = "bitlog-api"
main = "src/entry.worker.ts"
compatibility_date = "2026-02-15"

# Recommended (same-domain routing):
# routes = [
#   { pattern = "example.com/api/*", zone_name = "example.com" },
#   { pattern = "example.com/assets/*", zone_name = "example.com" },
#   { pattern = "example.com/rss.xml", zone_name = "example.com" },
#   { pattern = "example.com/sitemap.xml", zone_name = "example.com" }
# ]

# API worker owns D1/R2.
d1_databases = [
  { binding = "DB", database_name = "bitlog", database_id = "your_database_id", migrations_dir = "migrations" }
]

# Optional R2 bucket. Uncomment to enable uploads.
#
# r2_buckets = [
#   { binding = "ASSETS_R2", bucket_name = "bitlog-assets" }
# ]

[vars]
# Reserved for future.
#
# Password hashing:
# - PBKDF2 iterations must be <= 100000 on Cloudflare Workers (WebCrypto limit).
# - Optional: tune for performance (default: 100000).
# PASSWORD_PBKDF2_ITERATIONS = "100000"
#
# Recommended: set a pepper as a Worker secret (do NOT put it in vars):
#   wrangler secret put PASSWORD_PEPPER
