    <script>
      (function () {
        const root = document.documentElement;
        const sidebarToggle = document.getElementById("sidebarToggle");
        const mobileSidebarToggle = document.getElementById("mobileSidebarToggle");
        const sidebarBackdrop = document.getElementById("sidebarBackdrop");
        const themeToggle = document.getElementById("themeToggle");
        const brandStyle = document.getElementById("brandStyle");

        const toastEl = document.getElementById("demoToast");
        let toastTimer = null;

        const isMobile = () => window.matchMedia?.("(max-width: 860px)")?.matches ?? false;

        const storageGet = (k) => {
          try {
            return localStorage.getItem(k);
          } catch {
            return null;
          }
        };

        const storageSet = (k, v) => {
          try {
            localStorage.setItem(k, v);
          } catch {
            // ignore
          }
        };

        const state = {
          uiStyle: storageGet("demo-ui-style") || root.getAttribute("data-ui-style") || "terminal",
          theme: storageGet("demo-theme") || root.getAttribute("data-theme") || "dark",
          sidebar:
            storageGet("demo-sidebar") ||
            root.getAttribute("data-sidebar") ||
            (isMobile() ? "collapsed" : "expanded"),
          webStyle: storageGet("demo-web-style") || "glass",
          autoSummary: storageGet("demo-auto-summary") || "0"
        };

        const applyThemeIcon = () => {
          const darkIcon = themeToggle?.querySelector('[data-theme-icon="dark"]');
          const lightIcon = themeToggle?.querySelector('[data-theme-icon="light"]');
          if (!darkIcon || !lightIcon) return;
          if (state.theme === "dark") {
            darkIcon.classList.remove("demo-hidden");
            lightIcon.classList.add("demo-hidden");
          } else {
            darkIcon.classList.add("demo-hidden");
            lightIcon.classList.remove("demo-hidden");
          }
        };

        const apply = () => {
          root.setAttribute("data-ui-style", state.uiStyle);
          root.setAttribute("data-theme", state.theme);
          root.setAttribute("data-sidebar", state.sidebar);
          if (brandStyle) brandStyle.textContent = state.uiStyle;
          applyThemeIcon();
        };

        const showToast = (msg, type) => {
          if (!toastEl) return;
          toastEl.textContent = String(msg || "");
          toastEl.classList.remove("demo-hidden");
          toastEl.classList.toggle("toast-success", type !== "error");
          toastEl.classList.toggle("toast-error", type === "error");
          if (toastTimer) window.clearTimeout(toastTimer);
          toastTimer = window.setTimeout(() => {
            toastEl.classList.add("demo-hidden");
          }, 1400);
        };

        const setSidebar = (next) => {
          state.sidebar = next;
          storageSet("demo-sidebar", next);
          apply();
        };

        const toggleSidebar = () => {
          setSidebar(state.sidebar === "collapsed" ? "expanded" : "collapsed");
        };

        const closeSidebarOnMobile = () => {
          if (!isMobile()) return;
          if (state.sidebar === "collapsed") return;
          setSidebar("collapsed");
        };

        sidebarToggle?.addEventListener("click", toggleSidebar);
        mobileSidebarToggle?.addEventListener("click", toggleSidebar);
        sidebarBackdrop?.addEventListener("click", closeSidebarOnMobile);
        window.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeSidebarOnMobile();
        });

        themeToggle?.addEventListener("click", () => {
          state.theme = state.theme === "dark" ? "light" : "dark";
          storageSet("demo-theme", state.theme);
          apply();
        });

        const selectboxes = Array.from(document.querySelectorAll(".selectbox"));
        let openSelectbox = null;

        const closeSelectbox = (sb, focusTrigger) => {
          if (!sb) return;
          const trigger = sb.querySelector(".selectbox-trigger");
          const pop = sb.querySelector(".selectbox-popover");
          if (pop) pop.hidden = true;
          if (trigger) {
            trigger.classList.remove("is-open");
            trigger.setAttribute("aria-expanded", "false");
            if (focusTrigger) trigger.focus();
          }
          if (openSelectbox === sb) openSelectbox = null;
        };

        const openSelectboxAt = (sb) => {
          if (!sb) return;
          const trigger = sb.querySelector(".selectbox-trigger");
          const pop = sb.querySelector(".selectbox-popover");
          if (!trigger || !pop) return;
          if (openSelectbox && openSelectbox !== sb) closeSelectbox(openSelectbox, false);
          pop.hidden = false;
          trigger.classList.add("is-open");
          trigger.setAttribute("aria-expanded", "true");
          openSelectbox = sb;
        };

        const setSelectboxValue = (sb, nextValue) => {
          if (!sb) return;
          sb.setAttribute("data-value", String(nextValue || ""));
          const triggerValue = sb.querySelector(".selectbox-trigger .selectbox-value");
          const items = Array.from(sb.querySelectorAll(".selectbox-item"));
          let label = String(nextValue || "");

          for (const it of items) {
            const v = it.getAttribute("data-value") || "";
            const selected = v === String(nextValue || "");
            it.classList.toggle("is-selected", selected);
            it.setAttribute("aria-selected", selected ? "true" : "false");
            const check = it.querySelector(".selectbox-check");
            if (check) check.style.opacity = selected ? "1" : "0";
            if (selected) {
              const lbl = it.querySelector(".selectbox-item-label")?.textContent || "";
              if (lbl) label = lbl;
            }
          }

          if (triggerValue) triggerValue.textContent = label;
        };

        for (const sb of selectboxes) {
          const trigger = sb.querySelector(".selectbox-trigger");
          const pop = sb.querySelector(".selectbox-popover");
          if (!trigger || !pop) continue;

          trigger.addEventListener("click", () => {
            const isOpen = !pop.hidden;
            if (isOpen) closeSelectbox(sb, false);
            else openSelectboxAt(sb);
          });

          const items = Array.from(sb.querySelectorAll(".selectbox-item"));
          for (const it of items) {
            it.addEventListener("click", () => {
              const v = it.getAttribute("data-value") || "";
              setSelectboxValue(sb, v);
              closeSelectbox(sb, true);

              if (sb.id === "adminStyleSelect") {
                state.uiStyle = v || "current";
                storageSet("demo-ui-style", state.uiStyle);
                apply();
              } else if (sb.id === "webStyleSelect") {
                state.webStyle = v || "current";
                storageSet("demo-web-style", state.webStyle);
              } else if (sb.id === "autoSummarySelect") {
                state.autoSummary = v === "1" ? "1" : "0";
                storageSet("demo-auto-summary", state.autoSummary);
              }
            });
          }
        }

        document.addEventListener(
          "pointerdown",
          (e) => {
            if (!openSelectbox) return;
            const t = e.target;
            if (t && openSelectbox.contains(t)) return;
            closeSelectbox(openSelectbox, false);
          },
          true
        );

        document.addEventListener("keydown", (e) => {
          if (e.key !== "Escape") return;
          if (!openSelectbox) return;
          e.preventDefault();
          closeSelectbox(openSelectbox, true);
        });

        const toastButtons = Array.from(document.querySelectorAll("[data-toast]"));
        for (const el of toastButtons) {
          el.addEventListener("click", () => {
            showToast(el.getAttribute("data-toast") || "已完成（demo）", "success");
          });
        }

        // Apply initial state.
        setSelectboxValue(document.getElementById("adminStyleSelect"), state.uiStyle);
        setSelectboxValue(document.getElementById("webStyleSelect"), state.webStyle);
        setSelectboxValue(document.getElementById("autoSummarySelect"), state.autoSummary);
        apply();
      })();
    </script>
  </body>
</html>
