<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitlog Admin · 设置（夜间）</title>
    <link rel="stylesheet" href="./base.css" />
  </head>
  <body>
    <header class="admin-topbar">
      <div class="container">
        <div class="nav">
          <span class="brand">Bitlog Admin</span>
          <a href="#">文章</a>
          <a href="#">账号</a>
          <a class="active" href="#">设置</a>
        </div>
        <div class="nav">
          <span class="muted">@admin</span>
          <button class="btn ghost">退出</button>
          <button class="btn ghost" id="themeToggle">主题</button>
        </div>
      </div>
    </header>

    <main class="admin-shell">
      <div class="card">
        <div class="card-body">
          <h2 style="margin:0 0 6px;">站点设置</h2>
          <p class="muted">保存会触发缓存版本更新。</p>
          <div style="height:12px"></div>
          <div class="form-grid">
            <label class="field">
              site.base_url（必填）
              <input value="https://blog.example.com" />
            </label>
            <label class="field">
              site.timezone（IANA）
              <input value="Asia/Shanghai" />
            </label>
          </div>
          <div style="height:12px"></div>
          <div class="form-grid">
            <label class="field">
              Public Cache TTL（秒）
              <input value="600" />
            </label>
            <label class="field">
              占位
              <input value="—" disabled />
            </label>
          </div>
          <div style="height:12px"></div>
          <label class="field">
            site.embed_allowlist（一行一个 host）
            <textarea rows="5">youtube.com
github.com</textarea>
          </label>
          <label class="field">
            site.shortcuts_json（JSON）
            <textarea rows="6">{ "global": { "goHome": "ctrl+h" } }</textarea>
          </label>
          <div class="toolbar" style="margin-top:12px;">
            <button class="btn primary">保存设置</button>
          </div>
        </div>
      </div>

      <div style="height:16px"></div>

      <div class="card">
        <div class="card-body">
          <h2 style="margin:0 0 6px;">管理员密码</h2>
          <div class="form-grid">
            <label class="field">
              旧密码
              <input type="password" placeholder="••••••" />
            </label>
            <label class="field">
              新密码（≥6）
              <input type="password" placeholder="••••••" />
            </label>
          </div>
          <div class="toolbar" style="margin-top:12px;">
            <button class="btn">更新密码</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./theme-toggle.js"></script>
  </body>
</html>
