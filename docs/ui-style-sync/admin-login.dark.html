<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitlog Admin · 登录（夜间）</title>
    <link rel="stylesheet" href="./base.css" />
  </head>
  <body>
    <header class="admin-topbar">
      <div class="container">
        <a class="brand" href="./admin-posts.dark.html">Bitlog Admin</a>
        <div class="nav">
          <a href="./web-home.dark.html">站点</a>
          <button class="btn ghost" id="themeToggle">主题</button>
        </div>
      </div>
    </header>

    <main class="admin-shell">
      <div class="card" style="max-width:520px; margin: 40px auto;">
        <div class="card-body">
          <h2 style="margin:0 0 6px;">登录</h2>
          <p class="muted">默认账号：admin / 123456（示例）</p>
          <div style="height:14px"></div>
          <div class="form-grid">
            <label class="field">
              用户名
              <input placeholder="admin" />
            </label>
            <label class="field">
              密码
              <input type="password" placeholder="••••••" />
            </label>
          </div>
          <div style="height:12px"></div>
          <label class="field" style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" checked />
            记住我（30 天）
          </label>
          <div style="height:16px"></div>
          <button class="btn primary">登录</button>
        </div>
      </div>
    </main>

    <script src="./theme-toggle.js"></script>
  </body>
</html>
