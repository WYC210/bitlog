<!doctype html>
<html lang="zh-Hans" data-ui-style="terminal" data-theme="dark" data-sidebar="collapsed">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitlog Admin · 新建（写作）</title>

    <!-- Reuse existing admin CSS (no project code modifications). -->
    <link rel="stylesheet" href="../../apps/admin/src/ui/base.css" />
    <link rel="stylesheet" href="../../apps/admin/src/ui/themes.css" />
    <link rel="stylesheet" href="../../apps/admin/src/ui/compat.css" />
    <link rel="stylesheet" href="../../apps/admin/src/ui/editor.css" />

    <style>
      /* Demo-only: a couple of states that the real app controls via React. */
      .demo-hidden {
        display: none !important;
      }

      .toolbox-btn.is-active {
        background: color-mix(in srgb, var(--accent) 14%, transparent);
        border-color: color-mix(in srgb, var(--accent) 34%, var(--border));
        color: var(--text);
        text-shadow: 0 0 14px color-mix(in srgb, var(--accent) 24%, transparent);
      }

      /* Place toolbox at the left edge of the content (like Figure 2). */

      .topbar {
        justify-content: flex-start;
      }

      .topbar .actions {
        margin-left: auto;
      }

      .topbar-toolbox {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        flex: 1 1 auto;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        padding: 0 6px;
      }

      .topbar-toolbox::-webkit-scrollbar {
        height: 8px;
      }

      .topbar-toolbox::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--border) 55%, transparent);
        border-radius: 999px;
      }

      .topbar-toolbox .iconbtn {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        flex: 0 0 auto;
      }

      .topbar-toolbox .iconbtn.is-active {
        background: color-mix(in srgb, var(--accent) 16%, transparent);
        border-color: color-mix(in srgb, var(--accent) 34%, transparent);
      }

      .topbar-toolbox .iconbtn svg {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .topbar-toolbox-divider {
        width: 1px;
        height: 26px;
        flex: 0 0 auto;
        background: color-mix(in srgb, var(--segmented-divider) 90%, transparent);
        border-radius: 999px;
        opacity: 0.9;
      }

      .topbar-toolbox-label {
        display: none;
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.2px;
        line-height: 1;
        color: color-mix(in srgb, var(--text) 92%, transparent);
        white-space: nowrap;
      }

      @media (min-width: 861px) {
        .topbar-toolbox .iconbtn {
          width: auto;
          min-width: 44px;
          padding: 0 12px;
          gap: 10px;
          justify-content: flex-start;
        }

        .topbar-toolbox-label {
          display: inline;
        }
      }

      @media (max-width: 520px) {
        .topbar-toolbox {
          padding: 0 2px;
          gap: 8px;
        }
        .topbar-toolbox .iconbtn {
          width: 40px;
          height: 40px;
          border-radius: 14px;
          padding: 0;
          justify-content: center;
          gap: 0;
        }
      }

      /* Make the editor area match the screenshot's large block. */
      .cm-host .cm-editor {
        min-height: 520px;
      }

      @media (max-width: 980px) {
        .cm-host .cm-editor {
          min-height: 420px;
        }
      }

      /* Hide/show panes based on layout mode (the real app conditionally renders). */
      .grid--editor.layout--write .demo-preview {
        display: none;
      }

      .grid--editor.layout--preview .demo-editor {
        display: none;
      }

      /* Keep the preview card visually aligned with the editor card. */
      .grid--editor.layout--split > .card {
        align-self: stretch;
      }

      .demo-preview .md-prose h1 {
        margin: 0 0 14px;
        font-size: 36px;
        letter-spacing: 0.4px;
      }

      .demo-preview .md-prose p {
        margin: 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="侧边栏导航">
        <div class="brand">
          <div class="brand-left">
            <div class="logo" aria-hidden="true"></div>
            <div class="brand-title">
              <strong>Bitlog Admin</strong>
              <span id="brandStyle">terminal</span>
            </div>
          </div>
          <button class="iconbtn" type="button" id="sidebarToggle" aria-label="折叠/展开侧边栏" title="折叠/展开">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 4h7v16H3z" />
              <path d="M14 4h7v16h-7z" />
            </svg>
          </button>
        </div>

        <nav class="nav" aria-label="主菜单">
          <a href="./admin-login.html" aria-current="false" title="Demo：Dashboard">
            <span class="ico" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16v6H4z" />
                <path d="M4 14h16v6H4z" />
              </svg>
            </span>
            <span>
              <div class="lbl">Demo</div>
              <div class="sub">对齐 / 间距</div>
            </span>
            <span class="meta">D</span>
          </a>

          <a href="./admin-new.html" aria-current="page">
            <span class="ico" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
            </span>
            <span>
              <div class="lbl">新建</div>
              <div class="sub">写作 / New</div>
            </span>
            <span class="meta">⌘N</span>
          </a>

          <a href="./admin-settings.html" aria-current="false" title="Demo：Settings">
            <span class="ico" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
                <path
                  d="M19.4 15a7.7 7.7 0 0 0 .1-1l2-1.1-2-3.5-2.3.4a7.7 7.7 0 0 0-1.7-1l-.7-2.2H9.2l-.7 2.2a7.7 7.7 0 0 0-1.7 1L4.5 9.4l-2 3.5L4.5 14a7.7 7.7 0 0 0 .1 1l-2 1.1 2 3.5 2.3-.4a7.7 7.7 0 0 0 1.7 1l.7 2.2h5.6l.7-2.2a7.7 7.7 0 0 0 1.7-1l2.3.4 2-3.5-2-1.1Z"
                />
              </svg>
            </span>
            <span>
              <div class="lbl">设置</div>
              <div class="sub">站点 / 工具</div>
            </span>
            <span class="meta">S</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="me">
            <div class="me-text">
              <strong>@admin</strong>
              <small>Editor demo</small>
            </div>
            <button class="iconbtn" type="button" id="themeToggle" aria-label="切换主题" title="切换主题">
              <span data-theme-icon="dark" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span data-theme-icon="light" aria-hidden="true" class="demo-hidden">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                  <path
                    d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.07-7.07-1.41 1.41M8.34 15.66l-1.41 1.41m0-11.31 1.41 1.41m8.32 8.32 1.41 1.41"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
            </button>
          </div>
        </div>
      </aside>

      <div class="sidebar-backdrop" aria-hidden="true" id="sidebarBackdrop"></div>

      <main class="main" id="main">
        <header class="topbar" aria-label="页面头部">
          <div class="title">
            <button class="iconbtn sidebar-toggle" type="button" id="mobileSidebarToggle" aria-label="菜单" title="菜单">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 6h16" />
                <path d="M4 12h16" />
                <path d="M4 18h16" />
              </svg>
            </button>
            <h1>新建</h1>
            <div class="crumb">写作 / New</div>
          </div>
          <div class="topbar-toolbox" role="toolbar" aria-label="写作工具">
            <button class="iconbtn" type="button" aria-label="模糊" title="模糊" data-toast="插入：模糊（demo）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="M3 12h18" />
                <path d="M7 8h10" />
                <path d="M7 16h10" />
              </svg>
              <span class="topbar-toolbox-label">模糊</span>
            </button>
            <button class="iconbtn is-active" type="button" aria-label="行内代码" title="行内代码" data-toast="插入：行内代码（demo）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="m8 9-3 3 3 3" />
                <path d="m16 9 3 3-3 3" />
              </svg>
              <span class="topbar-toolbox-label">行内代码</span>
            </button>
            <button class="iconbtn" type="button" aria-label="代码块" title="代码块" data-toast="插入：代码块（demo）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="m8 9-3 3 3 3" />
                <path d="m16 9 3 3-3 3" />
                <path d="M12 7v10" />
              </svg>
              <span class="topbar-toolbox-label">代码块</span>
            </button>
            <span class="topbar-toolbox-divider" aria-hidden="true"></span>
            <button class="iconbtn" type="button" aria-label="链接" title="链接" data-toast="插入：链接（demo）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1" />
                <path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1" />
              </svg>
              <span class="topbar-toolbox-label">链接</span>
            </button>
            <button class="iconbtn" type="button" aria-label="图片" title="图片" data-toast="插入：图片（demo）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2" />
                <path d="M8 11h.01" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <span class="topbar-toolbox-label">图片</span>
            </button>
            <button class="iconbtn" type="button" aria-label="嵌入" title="嵌入" data-toast="插入：嵌入（demo）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="M8 17l-5-5 5-5" />
                <path d="M16 7l5 5-5 5" />
                <path d="M12 4l-2 16" />
              </svg>
              <span class="topbar-toolbox-label">嵌入</span>
            </button>
          </div>
          <div class="actions">
            <button class="iconbtn" type="button" aria-label="命令面板" title="命令面板（demo）" data-toast="Command Palette（demo）">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 4h16v16H4z" />
                <path d="M8 9h8" />
                <path d="M8 13h6" />
                <path d="M8 17h5" />
              </svg>
            </button>
            <button class="iconbtn" type="button" aria-label="切换主题" title="切换主题" id="themeToggleTop">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </header>

        <section class="content">
          <div class="content-full">
            <div class="grid grid--editor layout--split" id="editorGrid">
              <div class="card editor-card demo-editor">
                <div class="nav">
                  <a class="btn btn-ghost" href="./admin-login.html" title="返回列表（demo）">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="m15 18-6-6 6-6" />
                    </svg>
                    返回列表
                  </a>
                  <button class="btn primary" type="button" data-toast="已保存（demo）">保存</button>
                  <div class="layout-switcher" role="tablist" aria-label="布局">
                    <button class="btn" type="button" data-layout="write" aria-selected="false">写作</button>
                    <button class="btn" type="button" data-layout="preview" aria-selected="false">预览</button>
                    <button class="btn active" type="button" data-layout="split" aria-selected="true">分屏</button>
                  </div>
                </div>

                <div class="editor-meta">
                  <div class="grid2">
                    <label class="field">
                      标题
                      <input class="input" value="" placeholder="" />
                    </label>
                    <label class="field">
                      摘要
                      <input class="input" value="" placeholder="" />
                    </label>
                  </div>
                  <div class="grid2">
                    <label class="field">
                      分类（只允许 1 个）
                      <input class="input" value="" placeholder="例如：教学 / 编程" />
                    </label>
                    <label class="field">
                      标签（逗号分隔）
                      <input class="input" value="" placeholder="例如：教程, SQL, Edge" />
                    </label>
                  </div>
                  <div class="grid2">
                    <label class="field">
                      状态
                      <select class="select" aria-label="状态">
                        <option>草稿</option>
                        <option>已发布</option>
                        <option>定时</option>
                      </select>
                    </label>
                    <label class="field">
                      发布时间（ASIA/SHANGHAI）
                      <input class="input" value="" placeholder="yyyy/mm/dd --:--" />
                    </label>
                  </div>
                </div>

                <label class="field editor-md">
                  MARKDOWN
                  <div class="cm-host">
                    <div class="cm-editor">
                      <div class="cm-scroller" tabindex="0" role="textbox" aria-label="Markdown 编辑器（demo）">
                        <div class="cm-content">
                          <div># 标题</div>
                          <div></div>
                          <div>正文...</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </label>

                <div class="muted">
                  支持：表格/脚注/代码高亮(Refractor)/文字模糊(||text||)/嵌入短代码(@[provider](value))；允许原始 HTML（会做 XSS 清洗）。
                </div>
              </div>

              <div class="card demo-preview">
                <div class="md-preview-toolbar">
                  <div class="left">
                    <span style="font-weight: 900">预览</span>
                    <button class="btn btn-ghost" type="button" id="autoPreviewBtn">自动刷新：开</button>
                    <button class="btn primary" type="button" data-toast="已刷新预览（demo）">刷新预览</button>
                    <div class="layout-switcher" role="tablist" aria-label="布局（预览区）">
                      <button class="btn" type="button" data-layout="write" aria-selected="false">写作</button>
                      <button class="btn" type="button" data-layout="preview" aria-selected="false">预览</button>
                      <button class="btn active" type="button" data-layout="split" aria-selected="true">分屏</button>
                    </div>
                  </div>
                  <span class="muted" id="previewStatus"></span>
                </div>

                <div class="md-prose">
                  <h1>标题</h1>
                  <p>正文...</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast toast-success demo-hidden" id="demoToast" role="status" aria-live="polite"></div>

    <script>
      (function () {
        const root = document.documentElement;

        const brandStyle = document.getElementById("brandStyle");
        const sidebarToggle = document.getElementById("sidebarToggle");
        const mobileSidebarToggle = document.getElementById("mobileSidebarToggle");
        const sidebarBackdrop = document.getElementById("sidebarBackdrop");

        const themeToggle = document.getElementById("themeToggle");
        const themeToggleTop = document.getElementById("themeToggleTop");

        const editorGrid = document.getElementById("editorGrid");

        const autoPreviewBtn = document.getElementById("autoPreviewBtn");
        const previewStatus = document.getElementById("previewStatus");

        const toastEl = document.getElementById("demoToast");
        let toastTimer = null;

        const isMobile = () => window.matchMedia?.("(max-width: 860px)")?.matches ?? false;

        const storageGet = (k) => {
          try {
            return localStorage.getItem(k);
          } catch {
            return null;
          }
        };

        const storageSet = (k, v) => {
          try {
            localStorage.setItem(k, v);
          } catch {
            // ignore
          }
        };

        const state = {
          uiStyle: storageGet("demo-ui-style") || root.getAttribute("data-ui-style") || "terminal",
          theme: storageGet("demo-theme") || root.getAttribute("data-theme") || "dark",
          sidebar:
            storageGet("demo-sidebar") ||
            root.getAttribute("data-sidebar") ||
            (isMobile() ? "collapsed" : "collapsed"),
          layout: storageGet("demo-editor-layout") || "split",
          autoPreview: storageGet("demo-auto-preview") !== "0"
        };

        const applyThemeIcon = () => {
          const holder = themeToggle;
          if (!holder) return;
          const darkIcon = holder.querySelector('[data-theme-icon="dark"]');
          const lightIcon = holder.querySelector('[data-theme-icon="light"]');
          if (!darkIcon || !lightIcon) return;
          if (state.theme === "dark") {
            darkIcon.classList.remove("demo-hidden");
            lightIcon.classList.add("demo-hidden");
          } else {
            darkIcon.classList.add("demo-hidden");
            lightIcon.classList.remove("demo-hidden");
          }
        };

        const apply = () => {
          root.setAttribute("data-ui-style", state.uiStyle);
          root.setAttribute("data-theme", state.theme);
          root.setAttribute("data-sidebar", state.sidebar);
          if (brandStyle) brandStyle.textContent = state.uiStyle;
          applyThemeIcon();
        };

        const showToast = (msg, type) => {
          if (!toastEl) return;
          toastEl.textContent = String(msg || "");
          toastEl.classList.remove("demo-hidden");
          toastEl.classList.toggle("toast-success", type !== "error");
          toastEl.classList.toggle("toast-error", type === "error");
          if (toastTimer) window.clearTimeout(toastTimer);
          toastTimer = window.setTimeout(() => {
            toastEl.classList.add("demo-hidden");
          }, 1400);
        };

        const setSidebar = (next) => {
          state.sidebar = next;
          storageSet("demo-sidebar", next);
          apply();
        };

        const toggleSidebar = () => {
          setSidebar(state.sidebar === "collapsed" ? "expanded" : "collapsed");
        };

        const closeSidebarOnMobile = () => {
          if (!isMobile()) return;
          if (state.sidebar === "collapsed") return;
          setSidebar("collapsed");
        };

        sidebarToggle?.addEventListener("click", toggleSidebar);
        mobileSidebarToggle?.addEventListener("click", () => {
          if (isMobile()) toggleSidebar();
        });
        sidebarBackdrop?.addEventListener("click", closeSidebarOnMobile);
        window.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeSidebarOnMobile();
        });

        const toggleTheme = () => {
          state.theme = state.theme === "dark" ? "light" : "dark";
          storageSet("demo-theme", state.theme);
          apply();
        };

        themeToggle?.addEventListener("click", toggleTheme);
        themeToggleTop?.addEventListener("click", toggleTheme);

        const setLayout = (next) => {
          if (!editorGrid) return;
          state.layout = next;
          storageSet("demo-editor-layout", next);

          editorGrid.classList.remove("layout--write", "layout--preview", "layout--split");
          editorGrid.classList.add(`layout--${next}`);

          const switches = Array.from(document.querySelectorAll('.layout-switcher [data-layout]'));
          for (const b of switches) {
            const k = b.getAttribute("data-layout");
            const active = k === next;
            b.classList.toggle("active", active);
            b.setAttribute("aria-selected", active ? "true" : "false");
          }

          if (previewStatus) {
            previewStatus.textContent =
              next === "split" ? "" : next === "write" ? "仅写作模式" : "仅预览模式";
          }
        };

        // Bind layout buttons
        const layoutBtns = Array.from(document.querySelectorAll('[data-layout]'));
        for (const b of layoutBtns) {
          b.addEventListener("click", () => {
            const k = b.getAttribute("data-layout");
            if (!k) return;
            setLayout(k);
          });
        }

        // Auto preview toggle
        const syncAutoPreviewText = () => {
          if (!autoPreviewBtn) return;
          autoPreviewBtn.textContent = `自动刷新：${state.autoPreview ? "开" : "关"}`;
        };

        autoPreviewBtn?.addEventListener("click", () => {
          state.autoPreview = !state.autoPreview;
          storageSet("demo-auto-preview", state.autoPreview ? "1" : "0");
          syncAutoPreviewText();
          showToast(state.autoPreview ? "已开启自动刷新（demo）" : "已关闭自动刷新（demo）", "success");
        });

        // Generic toast buttons
        const toastButtons = Array.from(document.querySelectorAll("[data-toast]"));
        for (const el of toastButtons) {
          el.addEventListener("click", () => {
            showToast(el.getAttribute("data-toast") || "已完成（demo）", "success");
          });
        }

        // Apply initial state
        apply();
        setLayout(state.layout);
        syncAutoPreviewText();
      })();
    </script>
  </body>
</html>
