<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitlog Admin · 账号（夜间）</title>
    <link rel="stylesheet" href="./base.css" />
  </head>
  <body>
    <header class="admin-topbar">
      <div class="container">
        <div class="nav">
          <span class="brand">Bitlog Admin</span>
          <a href="#">文章</a>
          <a class="active" href="#">账号</a>
          <a href="#">设置</a>
        </div>
        <div class="nav">
          <span class="muted">@admin</span>
          <button class="btn ghost">退出</button>
          <button class="btn ghost" id="themeToggle">主题</button>
        </div>
      </div>
    </header>

    <main class="admin-shell">
      <div class="card">
        <div class="card-body">
          <h2 style="margin:0 0 6px;">账号</h2>
          <p class="muted">修改密码后将要求重新登录。</p>
          <div style="height:12px"></div>
          <div class="form-grid">
            <label class="field">
              旧密码
              <input type="password" placeholder="••••••" />
            </label>
            <label class="field">
              新密码（≥6）
              <input type="password" placeholder="••••••" />
            </label>
          </div>
          <div class="toolbar" style="margin-top:12px;">
            <button class="btn">更新密码</button>
          </div>
        </div>
      </div>

      <div style="height:16px"></div>

      <div class="card">
        <div class="card-body">
          <h2 style="margin:0 0 6px;">编辑器偏好</h2>
          <p class="muted">布局设置会跨设备生效。</p>
          <div class="toolbar" style="margin-top:12px;">
            <button class="btn">单栏：写作</button>
            <button class="btn">单栏：预览</button>
            <button class="btn primary">左右分栏</button>
          </div>
        </div>
      </div>

      <div style="height:16px"></div>

      <div class="card">
        <div class="card-body">
          <h2 style="margin:0 0 6px;">快捷键</h2>
          <p class="muted">支持 chord 与序列（如 g b）。</p>
          <div style="height:12px"></div>
          <div class="form-grid">
            <label class="field">
              新建文章
              <input value="mod+n" />
            </label>
            <label class="field">
              回到站点
              <input value="alt+h" />
            </label>
            <label class="field">
              后退
              <input value="g b" />
            </label>
            <label class="field">
              前进
              <input value="g n" />
            </label>
          </div>
          <div style="height:12px"></div>
          <label class="field">
            shortcuts_json（JSON）
            <textarea rows="6">{ "contexts": { "admin.global": { "newPost": "mod+n" } } }</textarea>
          </label>
          <div class="toolbar" style="margin-top:12px;">
            <button class="btn primary">保存偏好</button>
            <button class="btn">清空覆盖</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./theme-toggle.js"></script>
  </body>
</html>
