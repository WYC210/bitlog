<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitlog Demo (Terminal) - 标签</title>
    <link rel="stylesheet" href="../_shared/base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body data-page="tags">
    <header class="topbar" role="banner">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html" aria-label="HOME">
          <span class="logo" aria-hidden="true"></span>
          <strong>Bitlog</strong>
        </a>

        <div class="search" role="search">
          <div class="searchbox">
            <input type="search" placeholder="SEARCH_ARTICLES (Ctrl/Cmd+F)" />
            <span class="kbd">Ctrl/Cmd+F</span>
          </div>
        </div>

        <div class="right">
          <nav class="nav" data-nav aria-label="NAV">
            <a href="./index.html" data-page="home" aria-current="false">HOME</a>
            <a href="./categories.html" data-page="categories" aria-current="false">CATEGORIES</a>
            <a href="./tags.html" data-page="tags" aria-current="false">TAGS</a>
            <a href="./about.html" data-page="about" aria-current="false">ABOUT</a>
          </nav>
          <button class="iconbtn" type="button" title="THEME (DEMO)" onclick="alert('Demo button')">☼</button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="container">
        <section class="banner" aria-label="HEADER">
          <div class="banner-row">
            <div class="breadcrumb" aria-label="BREADCRUMB">
              <span class="crumb">TAGS</span>
              <span class="crumb">BITLOG</span>
              <span class="hint">BROWSE</span>
            </div>
          </div>
        </section>

        <section class="content" aria-label="CONTENT">
          <section class="card" aria-label="TAG_LIST">
            <h2><span class="h2-ico" aria-hidden="true"></span> ALL_TAGS</h2>
            <div style="display: flex; gap: 8px; flex-wrap: wrap">
              <a class="chip" href="#tag-workers">WORKERS</a>
              <a class="chip" href="#tag-d1">D1</a>
              <a class="chip" href="#tag-cache">CACHE</a>
              <a class="chip" href="#tag-md">MARKDOWN</a>
              <a class="chip" href="#tag-css">CSS</a>
              <a class="chip" href="#tag-auth">AUTH</a>
            </div>

            <div style="height: 14px"></div>
            <h2 id="tag-workers"><span class="h2-ico" aria-hidden="true"></span> TAG=WORKERS</h2>
            <div class="post-list">
              <a class="post-item" href="./post.html">
                <div class="meta"><span>2026/02/21</span><span>•</span><span>TUTORIAL</span></div>
                <div class="post-title" style="font-size: 16px; margin: 10px 0 0">DEPLOY_BITLOG</div>
              </a>
              <a class="post-item" href="./post.html">
                <div class="meta"><span>2026/02/19</span><span>•</span><span>PERF</span></div>
                <div class="post-title" style="font-size: 16px; margin: 10px 0 0">EDGE_CACHE</div>
              </a>
            </div>
          </section>

          <aside class="stack" aria-label="SIDEBAR">
            <section class="card" aria-label="NOTE">
              <h2><span class="h2-ico" aria-hidden="true"></span> NOTE</h2>
              <div class="muted">TAGS can be searched / grouped / counted.</div>
              <div style="height: 12px"></div>
              <button class="btn primary" type="button" onclick="location.href='./index.html'">BACK_HOME</button>
            </section>
          </aside>
        </section>
      </div>
    </main>

    <footer class="footer" role="contentinfo">
      <div class="container footer-inner">
        <span>© 2026 BITLOG DEMO</span>
        <span style="display: flex; gap: 12px; flex-wrap: wrap">
          <a href="./about.html">ABOUT</a>
          <a href="./categories.html">CATEGORIES</a>
          <a href="./index.html">HOME</a>
        </span>
      </div>
    </footer>

    <script src="../_shared/app.js"></script>
  </body>
</html>
