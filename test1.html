<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marginal Layout - Right</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(255, 255, 255, 0.06);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.62);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #4b6bff;
            --radius: 14px;
        }

        body {
            margin: 0;
            background: radial-gradient(1200px 700px at 85% -10%, rgba(75, 107, 255, .22), transparent 55%), var(--bg);
            color: var(--text);
            font: 16px/1.75 system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, .6);
        }

        .nav {
            max-width: 1180px;
            margin: 0 auto;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .brand {
            font-weight: 750;
            letter-spacing: .2px;
        }

        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 18px 70px;
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(12px, 1fr) minmax(260px, 320px) minmax(0, 760px) minmax(12px, 1fr);
            gap: 18px;
            align-items: start;
        }

        aside {
            grid-column: 2;
            position: sticky;
            top: 78px;
        }

        main {
            grid-column: 3;
        }

        .card {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
        }

        .meta {
            color: var(--muted);
            font-size: 13px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.18;
            margin: 0 0 8px;
            letter-spacing: -0.4px;
        }

        h2 {
            font-size: 20px;
            margin: 28px 0 10px;
        }

        .toc a {
            color: var(--muted);
            text-decoration: none;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .toc a:hover {
            color: var(--text);
            border-left-color: rgba(75, 107, 255, .55);
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }

            main,
            aside {
                grid-column: 1;
                position: static;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="nav">
            <div class="brand">bitlog</div>
            <div class="meta">主文偏右</div>
        </div>
    </header>

    <div class="wrap">
        <div class="grid">
            <aside class="card">
                <div class="meta" style="margin-bottom:10px;">目录 / 元信息</div>
                <div class="toc" style="display:grid; gap:10px;">
                    <a href="#a">开篇</a>
                    <a href="#b">为什么偏边</a>
                    <a href="#c">实现要点</a>
                </div>
                <div
                    style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border); color:var(--muted); font-size:13px;">
                    你可以把站点切换入口也放这里（偏“工具区”）。
                </div>
            </aside>

            <main class="card">
                <div class="meta">2026-02-15 · 分类：Notes</div>
                <h1>边缘化布局：主文偏右</h1>

                <h2 id="a">开篇</h2>
                <p>把主文放到右侧，会更像编辑式排版：左侧是索引/注释/工具。</p>

                <h2 id="b">为什么偏边</h2>
                <p>偏边布局能自然腾出“页边栏”承载结构信息（目录、标签、时间线），而不挤压正文。</p>

                <h2 id="c">实现要点</h2>
                <p>移动端要自动退化为单列；桌面端用 sticky 让目录跟随阅读。</p>
            </main>
        </div>
    </div>
</body>

</html>
